apiVersion: apps/v1
kind: Deployment
metadata:
  name: remotedesk-redis
  namespace: remotedesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: remotedesk-redis
  template:
    metadata:
      labels:
        app: remotedesk-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: remotedesk-redis
  namespace: remotedesk
spec:
  selector:
    app: remotedesk-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
