services:
  postgres:
    image: postgres:16-alpine
    container_name: remotedesk-postgres
    environment:
      POSTGRES_USER: remotedesk
      POSTGRES_PASSWORD: remotedesk
      POSTGRES_DB: remotedesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remotedesk"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: remotedesk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: remotedesk-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://remotedesk:remotedesk@postgres:5432/remotedesk
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32chars}
      PORT: 5000
      NODE_ENV: production
      TURN_SERVER: turn:coturn:3478
      TURN_USER: remotedesk
      TURN_PASS: remotedesk
    ports:
      - "5000:5000"
    restart: unless-stopped

  signaling:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: remotedesk-signaling
    depends_on:
      - redis
    environment:
      DATABASE_URL: postgresql://remotedesk:remotedesk@postgres:5432/remotedesk
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32chars}
      PORT: 5001
      NODE_ENV: production
    ports:
      - "5001:5001"
    command: ["node", "apps/api/dist/signaling.js"]
    restart: unless-stopped

  coturn:
    image: coturn/coturn:4.6
    container_name: remotedesk-coturn
    command: ["-n", "--log-file=stdout", "--min-port=49160", "--max-port=49200", "--lt-cred-mech", "--realm=remotedesk.local", "--user=remotedesk:remotedesk"]
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"

volumes:
  postgres_data:
  redis_data:
