services:
  postgres:
    image: postgres:16-alpine
    container_name: remotedesk-postgres
    environment:
      POSTGRES_USER: remotedesk
      POSTGRES_PASSWORD: remotedesk
      POSTGRES_DB: remotedesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remotedesk"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: remotedesk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: remotedesk-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://remotedesk:remotedesk@postgres:5432/remotedesk
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-in-production-32}
      PORT: 5000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      BETA_SOCKET_ENABLED: "true"
      BETA_WEBRTC_SIGNALING_ENABLED: "true"
      TURN_SERVER: ${TURN_SERVER:-turn:coturn:3478}
      TURN_USER: ${TURN_USER:-remotedesk}
      TURN_PASS: ${TURN_PASS:-remotedesk}
    ports:
      - "5000:5000"
    restart: unless-stopped

  coturn:
    image: coturn/coturn:4.6
    container_name: remotedesk-coturn
    command: ["-n", "--log-file=stdout", "--min-port=49160", "--max-port=49200", "--lt-cred-mech", "--realm=remotedesk.local", "--user=remotedesk:remotedesk"]
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"

volumes:
  postgres_data:
  redis_data:
