version: "3.8"
services:
  api:
    build: ./apps/api
    ports: ["3001:3001"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/remotedesk
      - REDIS_HOST=redis
    depends_on: [db, redis]
  
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: remotedesk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes: ["pgdata:/var/lib/postgresql/data"]
    ports: ["5432:5432"]
  
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  
  turn:
    image: coturn/coturn:latest
    ports: ["3478:3478/udp", "3478:3478/tcp"]
    command: >
      --min-port=49152 --max-port=65535
      --realm=remotedesk.io
      --fingerprint --lt-cred-mech

volumes:
  pgdata:
