apiVersion: apps/v1
kind: Deployment
metadata:
  name: remotedesk-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: remotedesk-api
  template:
    metadata:
      labels:
        app: remotedesk-api
    spec:
      containers:
        - name: api
          image: remotedesk/api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: remotedesk-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: remotedesk-api
spec:
  selector:
    app: remotedesk-api
  ports:
    - port: 4000
      targetPort: 4000
