openapi: 3.0.3
info:
  title: RemoteDesk Auth API
  version: 1.0.0
paths:
  /api/v1/auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                mfaCode: { type: string }
      responses:
        '200':
          description: Token pair
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      accessToken: { type: string }
                      refreshToken: { type: string }
                      expiresAt: { type: integer }
        '401':
          description: Invalid credentials
  /api/v1/auth/refresh:
    post:
      summary: Refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: New token pair
  /api/v1/auth/me:
    get:
      summary: Current user
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: User profile
