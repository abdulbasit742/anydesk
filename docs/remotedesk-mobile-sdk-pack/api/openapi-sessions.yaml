openapi: 3.0.3
info:
  title: RemoteDesk Sessions API
  version: 1.0.0
paths:
  /api/v1/sessions:
    get:
      summary: List sessions
      security: [ { bearerAuth: [] } ]
      parameters:
        - { name: page, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer } }
      responses:
        '200':
          description: Paginated session records
  /api/v1/sessions/{id}:
    get:
      summary: Get session
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: Session record
  /api/v1/sessions/{id}/end:
    post:
      summary: End active session
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: Session ended
