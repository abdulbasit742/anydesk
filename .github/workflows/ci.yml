name: RemoteDesk CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: remotedesk-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-build-test:
    name: Validate, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run local CI gates
        run: npm run ci:local
