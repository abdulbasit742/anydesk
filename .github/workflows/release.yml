name: RemoteDesk Release Build

# Builds signed Windows installer on every version tag (v1.0.0, v1.2.3, ...)
# Prerequisites (set in GitHub repo → Settings → Secrets and variables → Actions):
#   WIN_CSC_LINK          — base64-encoded .pfx file  (openssl pkcs12 -export ... | base64)
#   WIN_CSC_KEY_PASSWORD  — password for the .pfx
#   GH_TOKEN              — auto-provided by GitHub, no setup needed

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # needed to upload release assets

jobs:
  build-windows:
    name: Build & Sign Windows Installer
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --workspace=apps/api

      - name: Build desktop app
        working-directory: apps/desktop
        run: npm run build

      - name: Package installer (signed)
        working-directory: apps/desktop
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish never

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/dist-installer/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        working-directory: apps/desktop
        run: npm run build

      - name: Package DMG
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish never

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/dist-installer/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
